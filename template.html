<!doctype html>
<html class="" lang="{{lang}}">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=10, user-scalable=yes" />
        <base href="{{baseTag.href}}" target="{{baseTag.target}}" />

        {{#if title}}
        <title>{{title}}</title>
        {{/if}}

        <link rel="icon" type="image/x-icon" href="favicon.ico?_wwcv={{cacheVersion}}" />

        
        
        
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'">
<style>:root{ --ww-default-font-family: 'Space Grotesk', sans-serif }</style>
        <style>
:root {
--eaed7c02-9ef5-40de-9052-21364c34a98d: #E08A42;
--807027a7-4259-4150-95c6-f81a722c2428: #F4E7C9;}
.ww-app-theme-dark {
}
</style>
        

        {{#alternateLinks}}
        <link rel="{{rel}}" hreflang="{{hreflang}}" href="{{href}}" />
        {{/alternateLinks}} {{#if structuredData}}
        <script type="application/ld+json">
            {{{structuredData}}}
        </script>
        {{/if}} {{{scripts.head}}} {{#meta}} {{#if name}}
        <meta name="{{name}}" content="{{content}}" />
        {{/if}} {{#if itemprop}}
        <meta itemprop="{{itemprop}}" content="{{content}}" />
        {{/if}} {{#if property}}
        <meta property="{{property}}" content="{{content}}" />
        {{/if}} {{/meta}}
    </head>
    <body style="margin: 0; font-family: var(--ww-default-font-family, unset)">
        <noscript>
            <strong>
                We're sorry but this website doesn't work properly without JavaScript enabled. Please enable it to
                continue.
            </strong>
        </noscript>
        <div id="app"></div>
        {{{scripts.body}}}
        <script type="module" src="/src/_front/main.js"></script>
    </body>
</html>
