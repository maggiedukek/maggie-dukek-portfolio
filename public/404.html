<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex" />
        <title>Page not found | Maggie Dukek</title>
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --brand-orange: #e08a42;
                --brand-cream: #f4e7c9;
                --brand-dark: #100804;
            }
            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                height: 100%;
            }
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                font-family: 'Inter', sans-serif;
                color: var(--brand-cream);
                background:
                    radial-gradient(circle at 50% 0%, rgba(224, 138, 66, 0.12), transparent 45%),
                    linear-gradient(180deg, #0b0603 0%, #050302 60%, #0b0603 100%);
                background-color: var(--brand-dark);
                text-align: center;
            }
            .wrap {
                max-width: 560px;
            }
            .code {
                font-family: 'Space Grotesk', sans-serif;
                font-weight: 700;
                font-size: clamp(72px, 18vw, 140px);
                line-height: 1;
                letter-spacing: -2px;
                color: var(--brand-orange);
                text-shadow: 0 0 28px rgba(224, 138, 66, 0.35);
                margin: 0;
            }
            h1 {
                font-family: 'Space Grotesk', sans-serif;
                font-weight: 600;
                font-size: clamp(22px, 5vw, 30px);
                margin: 18px 0 12px;
                color: var(--brand-cream);
            }
            p {
                font-size: 16px;
                line-height: 1.6;
                color: rgba(245, 234, 216, 0.78);
                margin: 0 auto 32px;
                max-width: 440px;
            }
            .btn {
                display: inline-block;
                font-family: 'Space Grotesk', sans-serif;
                font-weight: 600;
                font-size: 16px;
                text-decoration: none;
                color: var(--brand-dark);
                background: linear-gradient(180deg, #f4c28a, #c96b2f);
                padding: 14px 30px;
                border-radius: 22px;
                box-shadow: 0 0 18px 2px rgba(201, 111, 53, 0.55);
                transition: transform 0.15s ease, box-shadow 0.15s ease;
            }
            .btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 0 26px 4px rgba(201, 111, 53, 0.7);
            }
            .nav {
                margin-top: 28px;
                font-size: 14px;
            }
            .nav a {
                color: rgba(245, 234, 216, 0.7);
                text-decoration: none;
                margin: 0 10px;
            }
            .nav a:hover {
                color: var(--brand-orange);
            }
        </style>
    </head>
    <body>
        <main class="wrap">
            <p class="code">404</p>
            <h1>This one’s a little too messy.</h1>
            <p>
                The page you’re after doesn’t exist (or never got built). Bring me the mess and I’ll turn it into
                something that actually works.
            </p>
            <a class="btn" href="/">Back to home</a>
            <nav class="nav">
                <a href="/work">Work</a>
                <a href="/process">Process</a>
                <a href="/start-a-project">Start a Project</a>
            </nav>
        </main>
    </body>
</html>
